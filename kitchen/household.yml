# ─────────────────────────────────────────────────────────────────────────────
# EXAMPLE TEMPLATE — not a real household. During onboarding, an agent copies
# this to kitchen/household.local.yml (gitignored) and fills in your details.
# Nothing here imposes a diet; food beliefs live in food-rules.yml.
# ─────────────────────────────────────────────────────────────────────────────
version: 1

household:
  name: My Kitchen
  default_servings: 2

members:
  - id: primary
    name: Primary user
    role: owner

settings:
  timezone: America/Phoenix
  measurement_system: us
  pantry_precision: approximate
